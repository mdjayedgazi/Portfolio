<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="./images/Group 1.png" />

    <link rel="stylesheet" href="contact.css">
    <title>Contact Form</title>
</head>

<body>
    <section class="main-section">
        <div class="left">
            <img src="./images/undraw_contact-us_s4jn.svg" alt="">
        </div>
        <div class="righ">
            <form action="">
                <div class="name">
                    <label for="name">Full Name</label>
                    <input type="text" name="name" id="name" required placeholder="Your full name">
                </div>
                <div>
                    <label for="company">Company Name</label>
                    <input type="text" name="company" id="company" placeholder="Your company name">
                </div>
                <div>
                    <label for="email">Email</label>
                    <input type="email" name="email" id="email" required placeholder="Your email address">
                </div>
                <div>
                    <label for="phone">Phome</label>
                    <input type="tel" name="phone" id="phone" required placeholder="Your phone number">
                </div>
                <div>
                    <input type="checkbox" id="agree" name="agree" value="agree">
                    <label for="agree">I agree that my personal data will be processed in accordance with the privacy
                        policy</label>
                </div>
                <div>
                    <input type="submit" value="Submit">
                </div>
            </form>
        </div>
    </section>
</body>

</html>
